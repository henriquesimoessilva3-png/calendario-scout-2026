<!DOCTYPE html>
<html lang="pt-BR">

<title>Calendário Scout 2026</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:13px;background:#f5f4f0;color:#1a1a18}
.app{min-height:100vh}
.nav{display:flex;gap:2px;padding:8px 12px;background:#2c2c2a;flex-wrap:wrap}
.nav-btn{padding:6px 14px;border:none;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;transition:opacity .15s}
.nav-btn:hover{opacity:.85}
.nav-btn.active{outline:2px solid rgba(255,255,255,.5);outline-offset:1px}
.view{display:none;padding:0}
.view.active{display:block}
.toolbar{padding:10px 12px;background:#fff;border-bottom:0.5px solid #e0ded4;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.toolbar h1{font-size:15px;font-weight:500;color:#1a1a18}
.toolbar p{font-size:11px;color:#888780}
.legend{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-left:auto}
.leg{display:flex;align-items:center;gap:4px;font-size:11px;color:#5f5e5a}
.leg-dot{width:12px;height:10px;border-radius:2px}
.scroll-wrap{overflow:auto;-webkit-overflow-scrolling:touch}
table.cal{border-collapse:collapse;font-size:11px;min-width:900px;width:100%}
.cal th,.cal td{border:0.5px solid #e0ded4}
.cal .col-name{position:sticky;left:0;z-index:2;background:#fff;min-width:200px;max-width:240px;padding:4px 6px 4px 12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cal .col-start,.cal .col-end{min-width:70px;padding:3px 5px;text-align:center;background:#ebf4fd;color:#0a3d6b;font-size:10px}
.cal .col-s{min-width:82px;padding:2px 3px;text-align:center}
.cal .col-s select{width:100%;border:none;background:transparent;font-size:10px;cursor:pointer;color:#1a1a18;padding:1px}
.cal .period{width:20px;min-width:20px;height:22px;text-align:center;vertical-align:middle;font-size:7px;font-weight:500;cursor:default;padding:0}
.cal .period.active{color:#fff}
.cal .period.month-end{border-right:1.5px solid #b4b2a9!important}
.row-group td{background:#a8d468;color:#1b4d06;font-weight:500;font-size:10px;padding:5px 8px;border-top:2px solid #5a5855!important}
.row-group.g-brasil-base td{background:#5dcaa5;color:#04342c}
.row-group.g-sa-pro td{background:#4ba0e0;color:#042c53}
.row-group.g-sa-base td{background:#9a8ee0;color:#26215c}
.row-group.g-mundo td{background:#e07090;color:#4a0c28}
.row-sg td{font-size:10px;padding:3px 8px 3px 20px;color:#5f5e5a;background:#f5f5f0}
.cal tr.data:hover .col-name{background:#f0eeea}
.cal tr.data:nth-child(even) .col-name{background:#f9f8f4}
.inactive-cell{background:#eeecea}
.inactive-cell:nth-child(odd){background:#f4f3ec}
.period.multi{background:#2c2c2a!important}
th.month-hdr{text-align:center;font-weight:500;font-size:10px;padding:4px;background:#d8d6cc;height:27px}
th.month-hdr:nth-child(even){background:#e4e2d8}
th.period-hdr{font-size:7px;color:#888780;background:#eeecea;padding:2px 0;text-align:center;width:20px;min-width:20px;overflow:hidden}
th.period-hdr:nth-child(even){background:#f4f3ec}
th.hdr-name{background:#2c2c2a;color:#f1efe8;font-weight:500;padding:5px 8px;text-align:left;position:sticky;left:0;z-index:3}
th.hdr-col{background:#2c2c2a;color:#f1efe8;font-weight:500;padding:5px 4px;text-align:center;font-size:10px}
.level-pro{background:#eaf3de;color:#27500a;border-radius:3px;padding:2px 5px}
.level-base{background:#e6f1fb;color:#0c447c;border-radius:3px;padding:2px 5px}
.empty-state{padding:40px;text-align:center;color:#888780;font-size:13px}
.resumo-wrap{padding:12px;overflow-x:auto}
.resumo-table{border-collapse:collapse;font-size:11px;min-width:700px}
.resumo-table th,.resumo-table td{border:0.5px solid #e0ded4;padding:5px 7px;text-align:center}
.resumo-table .r-scout{text-align:left;padding:6px 10px;font-weight:500;font-size:12px;min-width:130px;color:#fff}
.resumo-table .r-val{font-size:13px;font-weight:500}

.resumo-table .r-base{background:#e6f1fb;color:#0c447c}

.resumo-table .sub-hdr{font-size:9px;color:#5f5e5a;background:#f0eee8;font-weight:500}
.resumo-table .r-grand{background:#2c2c2a;color:#f1efe8;font-weight:500}
.save-badge{font-size:10px;color:#888780;padding:3px 8px;border-radius:4px;background:#f0eeea}
.sv-name{padding:4px 8px;font-size:12px;color:#1a1a18;min-width:220px;border:0.5px solid #e0ded4;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:240px}
.sv-col{padding:4px 6px;font-size:11px;color:#5f5e5a;border:0.5px solid #e0ded4;text-align:center;white-space:nowrap}
.sv-dates{color:#0a3d6b;font-size:10px}
.sv-mhdr{text-align:center;font-weight:500;font-size:10px;padding:4px 2px;background:#d8d6cc;height:27px}
.sv-mhdr:nth-child(even){background:#e4e2d8}

.cal thead tr:nth-child(2) th{position:sticky;z-index:4}
.cal thead tr:first-child .hdr-name{position:sticky;left:0;top:0;z-index:6}

let currentView='cal';

function loadData(){
  try{const s=localStorage.getItem('scout_cal_2026');if(s){const d=JSON.parse(s);d.forEach(c=>{const f=DATA.find(x=>x.id===c.id);if(f){f.scouts=c.scouts||[];f.start=c.start;f.end=c.end;}})}}catch(e){}
}
function saveData(){
  try{localStorage.setItem('scout_cal_2026',JSON.stringify(DATA.map(c=>({id:c.id,scouts:c.scouts,start:c.start,end:c.end}))));}catch(e){}
  document.getElementById('save-badge').textContent='Salvo';
}

function isActive(comp,period){
  if(!comp.start||!comp.end) return false;
  const cs=new Date(comp.start+' '),ce=new Date(comp.end+' ');
  return cs<=period.end && ce>=period.start;
}

function cellColor(comp){
  const assigned=comp.scouts.filter(s=>s&&s!=='');
  if(!assigned.length) return null;
  if(assigned.length>1) return MULTI_COLOR;
  return SCOUT_COLORS[assigned[0]]?.soft||null;
}

function renderNav(){
  const nav=document.getElementById('nav');
  const views=[{id:'cal',label:'Calendário'},
    ...SCOUTS.map(s=>({id:'scout_'+s,label:s,color:SCOUT_COLORS[s].btn}))];
  nav.innerHTML=views.map(v=>`
    <button class="nav-btn${currentView===v.id?' active':''}"
      style="background:${v.color||'#3a3835'};color:#fff"
      onclick="switchView('${v.id}')">${v.label}</button>`).join('');
}

function switchView(id){currentView=id;renderNav();renderViews();}

function renderViews(){
  const views=document.getElementById('views');
  if(currentView==='cal'){views.innerHTML=renderCal();setTimeout(fixStickyTops,10);}
  else if(currentView==='resumo'){views.innerHTML=renderResumo();setTimeout(fixStickyTops,10);}
  else{const s=currentView.replace('scout_','');views.innerHTML=renderScoutView(s);setTimeout(fixStickyTops,10);}
}

function renderCal(){
  const groups=[...new Set(DATA.map(c=>c.group))];
  let rows='';
  groups.forEach(g=>{
    const cls=GROUP_CLASSES[g]||'';
    const label=GROUP_LABELS[g]||g;
    rows+=`<tr class="row-group ${cls}"><td colspan="${4+SCOUTS.length+PERIODS.length}">${label}</td></tr>`;
    const sgs=[...new Set(DATA.filter(c=>c.group===g).map(c=>c.subgroup))];
    sgs.forEach(sg=>{
      rows+=`<tr class="row-sg"><td colspan="${4+SCOUTS.length+PERIODS.length}">${sg}</td></tr>`;
      DATA.filter(c=>c.group===g&&c.subgroup===sg).forEach(comp=>{
        const active=PERIODS.map(p=>isActive(comp,p));
        const assigned=comp.scouts.filter(s=>s&&s!=='');
        const color=cellColor(comp);
        const textCol=assigned.length>1?'#fff':(assigned[0]?SCOUT_COLORS[assigned[0]]?.text||'#1a1a18':'#1a1a18');
        rows+=`<tr class="data" id="row-${comp.id}">
          <td class="col-name" title="${comp.name}">${comp.name}</td>
          <td class="col-start"><input class="date-input" type="date" value="${comp.start||''}" onchange="updateDate(${comp.id},'start',this.value)"></td>
          <td class="col-end"><input class="date-input" type="date" value="${comp.end||''}" onchange="updateDate(${comp.id},'end',this.value)"></td>`;
        SCOUTS.forEach((s,si)=>{
          rows+=`<td class="col-s"><select onchange="updateScout(${comp.id},${si},this.value)">
            <option value="">—</option>
            ${SCOUTS.map(sc=>`<option value="${sc}"${comp.scouts[si]===sc?' selected':''}>${sc}</option>`).join('')}
          </select></td>`;
        });
        PERIODS.forEach((p,pi)=>{
          const act=active[pi];
          const isEnd=(pi+1)%3===0;
          const bg=act&&color?color:ALT[p.m%2];
          const fc=act&&color?textCol:'transparent';
          const initials=assigned.length>1?assigned.map(s=>s[0]).join(''):(assigned[0]?assigned[0][0]:'');
          rows+=`<td class="period${act?' active':''}${isEnd?' month-end':''}"
            style="background:${bg};color:${fc}">${act&&assigned.length?initials:act?'·':''}</td>`;
        });
        rows+='</tr>';
      });
    });
  });

  const monthHdrs=MONTHS.map((m,mi)=>`<th class="month-hdr" colspan="3">${m}</th>`).join('');
  const periodHdrs=PERIODS.map((p,pi)=>`<th class="period-hdr${(pi+1)%3===0?' month-end':''}">${p.label}</th>`).join('');
  const scoutHdrs=SCOUTS.map(s=>`<th class="hdr-col">${s}</th>`).join('');

  return `<div class="view active">
    <div class="toolbar">
      <div><h1>Calendário de Cobertura 2026</h1>
      <p>Edite datas nas colunas B/C · Selecione até 4 scouts · 1 scout = cor do scout · 2+ scouts = preto</p></div>
      <div class="legend">
        ${SCOUTS.map(s=>`<span class="leg"><span class="leg-dot" style="background:${SCOUT_COLORS[s].soft}"></span>${s}</span>`).join('')}
        <span class="leg"><span class="leg-dot" style="background:#2c2c2a"></span>2+ scouts</span>
        <span class="leg"><span class="leg-dot" style="background:#ccc"></span>Sem scout</span>
      </div>
      <span class="save-badge" id="save-badge">Auto-salvo</span>
    </div>
    <div class="scroll-wrap">
    <table class="cal">
      <thead>
        <tr>
          <th class="hdr-name" rowspan="2">Campeonato</th>
          <th class="hdr-col" rowspan="2">Início</th>
          <th class="hdr-col" rowspan="2">Fim</th>
          ${SCOUTS.map((s,i)=>`<th class="hdr-col" rowspan="2" style="background:#484038">Scout ${i+1}</th>`).join('')}
          ${monthHdrs}
        </tr>
        <tr>${periodHdrs}</tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>
    </div></div>`;
}

function renderScoutView(scout){
  const color=SCOUT_COLORS[scout];
  const assigned=DATA.filter(c=>c.scouts.some(s=>s===scout));

  const monthHdrs=MONTHS.map(m=>`<th class="sv-mhdr" colspan="3">${m}</th>`).join('');
  const periodHdrs=PERIODS.map((p,pi)=>{
    const isEnd=(pi+1)%3===0;
    const lbl=p.p===0?'1':p.p===1?'11':'21';
    return `<th class="sv-phdr${isEnd?' month-end':''}">${lbl}</th>`;
  }).join('');

  let bodyRows='';
  if(!assigned.length){
    bodyRows=`<tr><td colspan="${4+PERIODS.length}" class="empty-state">Nenhuma competição atribuída a ${scout} ainda. Atribua no Calendário.</td></tr>`;
  } else {
    bodyRows=assigned.map((comp,ri)=>{
      const active=PERIODS.map(p=>isActive(comp,p));
      const rowbg=ri%2===0?'#fff':'#f9f8f4';
      const periodCells=PERIODS.map((p,pi)=>{
        const act=active[pi];
        const isEnd=(pi+1)%3===0;
        const bg=act?color.soft:ALT[p.m%2];
        return `<td style="background:${bg};width:18px;min-width:18px;height:26px;border:0.5px solid #e0ded4${isEnd?';border-right:1.5px solid #b4b2a9':''}"></td>`;
      }).join('');
      return `<tr style="background:${rowbg}">
        <td class="sv-name">${comp.name}</td>
        <td class="sv-col">${comp.country}</td>
        <td class="sv-col"><span class="level-${comp.level==='Base'?'base':'pro'}">${comp.level}</span></td>
        <td class="sv-col sv-dates">${comp.start?comp.start.slice(5).replace('-','/'):'?'} → ${comp.end?comp.end.slice(5).replace('-','/'):'?'}</td>
        ${periodCells}
      </tr>`;
    }).join('');
  }

  return `<div class="view active">
    <div class="toolbar">
      <div style="width:14px;height:14px;border-radius:50%;background:${color.btn};flex-shrink:0"></div>
      <div><h1>${scout} — Competições Atribuídas 2026</h1>
      <p>${assigned.length} competição(ões) atribuída(s)</p></div>
    </div>
    <div class="scroll-wrap">
    <table class="cal" style="min-width:800px">
      <thead>
        <tr>
          <th class="hdr-name" rowspan="2" style="min-width:220px">Campeonato</th>
          <th class="hdr-col" rowspan="2" style="min-width:90px">País</th>
          <th class="hdr-col" rowspan="2" style="min-width:80px">Nível</th>
          <th class="hdr-col" rowspan="2" style="min-width:110px">Período</th>
          ${monthHdrs}
        </tr>
        <tr>${periodHdrs}</tr>
      </thead>
      <tbody>${bodyRows}</tbody>
    </table>
    </div></div>`;
}

function renderResumo(){
  const calcs=SCOUTS.map(scout=>{
    const months=MONTHS.map((_,mi)=>{
      const pro=DATA.filter(c=>c.scouts.includes(scout)&&c.level==='Profissional'&&isActiveInMonth(c,mi)).length;
      const base=DATA.filter(c=>c.scouts.includes(scout)&&c.level==='Base'&&isActiveInMonth(c,mi)).length;
      return {pro,base};
    });
    const totPro=months.reduce((a,m)=>a+m.pro,0);
    const totBase=months.reduce((a,m)=>a+m.base,0);
    return {scout,months,totPro,totBase};
  });

  const monthHdrs=MONTHS.map(m=>`<th class="m-hdr" colspan="2">${m}</th>`).join('');
  const subHdrs=MONTHS.map(()=>`<th class="sub-hdr">Pro</th><th class="sub-hdr">Base</th>`).join('');
  
  const rows=calcs.map(({scout,months,totPro,totBase})=>{
    const c=SCOUT_COLORS[scout];
    const monthCells=months.map(m=>
      `<td class="r-val r-pro">${m.pro||''}</td><td class="r-val r-base">${m.base||''}</td>`).join('');
    return `<tr>
      <td class="r-scout" style="background:${c.btn}">${scout}</td>
      <td class="r-val r-pro r-total">${totPro||''}</td>
      <td class="r-val r-base r-total">${totBase||''}</td>
      ${monthCells}
    </tr>`;
  }).join('');

  const grandMonths=MONTHS.map((_,mi)=>{
    const pro=DATA.filter(c=>c.scouts.some(s=>s)&&c.level==='Profissional'&&isActiveInMonth(c,mi)).length;
    const base=DATA.filter(c=>c.scouts.some(s=>s)&&c.level==='Base'&&isActiveInMonth(c,mi)).length;
    return `<td class="r-grand">${pro||''}</td><td class="r-grand">${base||''}</td>`;
  }).join('');
  const grandPro=calcs.reduce((a,c)=>a+c.totPro,0);
  const grandBase=calcs.reduce((a,c)=>a+c.totBase,0);

  return `<div class="view active">
    <div class="toolbar">
      <div><h1>Resumo de Cobertura — 2026</h1>
      <p>Scouts nas linhas · Meses nas colunas · Pro = Profissional · Base = Base</p></div>
    </div>
    <div class="resumo-wrap">
    <table class="resumo-table">
      <thead>
        <tr>
          <th rowspan="2" style="background:#2c2c2a;color:#f1efe8">Scout</th>
          <th colspan="2" style="background:#444441;color:#f1efe8">Total Ano</th>
          ${monthHdrs}
        </tr>
        <tr>
          <th class="sub-hdr" style="background:#e0ece8;color:#27500a">Pro</th>
          <th class="sub-hdr" style="background:#d8e8f5;color:#0c447c">Base</th>
          ${subHdrs}
        </tr>
      </thead>
      <tbody>
        ${rows}
        <tr>
          <td class="r-grand" style="text-align:left;padding-left:10px">Total Geral</td>
          <td class="r-grand">${grandPro||''}</td>
          <td class="r-grand">${grandBase||''}</td>
          ${grandMonths}
        </tr>
      </tbody>
    </table>
    </div></div>`;
}

function isActiveInMonth(comp,monthIdx){
  if(!comp.start||!comp.end) return false;
  const cs=new Date(comp.start+' '),ce=new Date(comp.end+' ');
  const ms=new Date(2026,monthIdx,1),me=new Date(2026,monthIdx+1,0);
  return cs<=me&&ce>=ms;
}

function updateScout(id,slot,value){
  const comp=DATA.find(c=>c.id===id);
  if(!comp) return;
  comp.scouts=comp.scouts.slice();
  while(comp.scouts.length<=slot) comp.scouts.push('');
  comp.scouts[slot]=value;
  comp.scouts=comp.scouts.filter((s,i)=>i<=Math.max(...comp.scouts.map((_,i)=>comp.scouts[i]?i:-1)));
  saveData();
  renderViews();
}

function updateDate(id,field,value){
  const comp=DATA.find(c=>c.id===id);
  if(comp){comp[field]=value;saveData();renderViews();}
}

loadData();
renderNav();
renderViews();

function fixStickyTops(){
  const nav=document.querySelector('.nav');
  const toolbar=document.querySelector('.toolbar');
  const wrap=document.querySelector('.scroll-wrap');
  if(!nav||!toolbar||!wrap) return;
  const navH=nav.getBoundingClientRect().height;
  const toolH=toolbar.getBoundingClientRect().height;
  const reserved=navH+toolH;
  wrap.style.height=(window.innerHeight-reserved)+'px';
  const firstRow=wrap.querySelector('thead tr:first-child');
  const rowH=firstRow?firstRow.getBoundingClientRect().height:27;
  wrap.querySelectorAll('thead tr:first-child th').forEach(el=>el.style.top='0px');
  wrap.querySelectorAll('thead tr:nth-child(2) th').forEach(el=>el.style.top=rowH+'px');
  wrap.querySelectorAll('thead tr:first-child .hdr-name').forEach(el=>{el.style.top='0px';el.style.left='0px';});
}
window.addEventListener('resize',fixStickyTops);
setTimeout(fixStickyTops,50);
</script>
